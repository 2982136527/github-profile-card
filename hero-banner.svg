<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FF69B4" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#9B59B6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9B59B6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FF69B4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF69B4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="50%" stop-color="#D4A5FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <radialGradient id="dot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF69B4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#9B59B6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes drift-slow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
    @keyframes pulse-soft { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
    @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes rotate-rev { from{transform:rotate(360deg)} to{transform:rotate(0deg)} }
    @keyframes shimmer { 0%,100%{stop-color:#FF69B4} 50%{stop-color:#D4A5FF} }
    @keyframes float-x { 0%,100%{transform:translateX(0)} 50%{transform:translateX(20px)} }
    @keyframes dash { to{stroke-dashoffset:-1000} }
  </style>

  <!-- Background -->
  <rect width="900" height="260" fill="#0a0a1a"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#FF69B4" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="260"/><line x1="60" y1="0" x2="60" y2="260"/><line x1="120" y1="0" x2="120" y2="260"/><line x1="180" y1="0" x2="180" y2="260"/><line x1="240" y1="0" x2="240" y2="260"/><line x1="300" y1="0" x2="300" y2="260"/><line x1="360" y1="0" x2="360" y2="260"/><line x1="420" y1="0" x2="420" y2="260"/><line x1="480" y1="0" x2="480" y2="260"/><line x1="540" y1="0" x2="540" y2="260"/><line x1="600" y1="0" x2="600" y2="260"/><line x1="660" y1="0" x2="660" y2="260"/><line x1="720" y1="0" x2="720" y2="260"/><line x1="780" y1="0" x2="780" y2="260"/><line x1="840" y1="0" x2="840" y2="260"/><line x1="900" y1="0" x2="900" y2="260"/>
    <line x1="0" y1="0" x2="900" y2="0"/><line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/><line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/><line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
  </g>

  <!-- Ambient orbs -->
  <circle cx="200" cy="100" r="120" fill="url(#orb)" opacity="0.5">
    <animate attributeName="cx" values="200;280;200" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="160" r="100" fill="url(#orb)" opacity="0.4">
    <animate attributeName="cy" values="160;100;160" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Aurora waves -->
  <g filter="url(#glow)">
    <path fill="url(#aurora1)" opacity="0.5">
      <animate attributeName="d" values="M0,140 C150,100 300,180 450,130 C600,80 750,160 900,120 L900,200 C750,220 600,170 450,200 C300,230 150,180 0,210 Z;M0,120 C150,160 300,100 450,150 C600,180 750,100 900,140 L900,210 C750,190 600,240 450,200 C300,160 150,220 0,190 Z;M0,140 C150,100 300,180 450,130 C600,80 750,160 900,120 L900,200 C750,220 600,170 450,200 C300,230 150,180 0,210 Z" dur="6s" repeatCount="indefinite"/>
    </path>
    <path fill="url(#aurora2)" opacity="0.3">
      <animate attributeName="d" values="M0,160 C200,130 350,190 500,150 C650,110 800,170 900,150 L900,230 C800,210 650,260 500,220 C350,180 200,240 0,200 Z;M0,150 C200,180 350,120 500,170 C650,200 800,130 900,160 L900,220 C800,240 650,190 500,230 C350,260 200,200 0,230 Z;M0,160 C200,130 350,190 500,150 C650,110 800,170 900,150 L900,230 C800,210 650,260 500,220 C350,180 200,240 0,200 Z" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Constellation lines -->
  <g stroke="#FF69B4" stroke-width="0.5" opacity="0.12">
    <line x1="80" y1="45" x2="165" y2="85"><animate attributeName="opacity" values="0.12;0.25;0.12" dur="4s" repeatCount="indefinite"/></line>
    <line x1="165" y1="85" x2="250" y2="50"><animate attributeName="opacity" values="0.12;0.2;0.12" dur="5s" repeatCount="indefinite"/></line>
    <line x1="250" y1="50" x2="340" y2="75"><animate attributeName="opacity" values="0.12;0.22;0.12" dur="4.5s" repeatCount="indefinite"/></line>
    <line x1="560" y1="55" x2="660" y2="90"><animate attributeName="opacity" values="0.12;0.25;0.12" dur="5.5s" repeatCount="indefinite"/></line>
    <line x1="660" y1="90" x2="750" y2="40"><animate attributeName="opacity" values="0.12;0.2;0.12" dur="4s" repeatCount="indefinite"/></line>
    <line x1="750" y1="40" x2="830" y2="70"><animate attributeName="opacity" values="0.12;0.22;0.12" dur="6s" repeatCount="indefinite"/></line>
  </g>

  <!-- Orbiting geometry - left -->
  <g transform="translate(130,130)">
    <g filter="url(#glow)" style="animation:rotate 20s linear infinite;transform-origin:0 0">
      <polygon points="0,-35 30,17 -30,17" fill="none" stroke="#FF69B4" stroke-width="1.5" opacity="0.6"/>
    </g>
    <g filter="url(#glow)" style="animation:rotate-rev 15s linear infinite;transform-origin:0 0">
      <rect x="-22" y="-22" width="44" height="44" rx="2" fill="none" stroke="#D4A5FF" stroke-width="1" opacity="0.4" transform="rotate(45)"/>
    </g>
    <g style="animation:rotate 25s linear infinite;transform-origin:0 0">
      <circle cx="50" cy="0" r="2.5" fill="#FF69B4" opacity="0.8"/>
      <circle cx="-40" cy="30" r="1.5" fill="#00D4FF" opacity="0.6"/>
    </g>
  </g>

  <!-- Orbiting geometry - right -->
  <g transform="translate(770,130)">
    <g filter="url(#glow)" style="animation:rotate-rev 18s linear infinite;transform-origin:0 0">
      <polygon points="0,-30 26,15 -26,15" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g filter="url(#glow)" style="animation:rotate 22s linear infinite;transform-origin:0 0">
      <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="#FF69B4" stroke-width="1" opacity="0.35"/>
    </g>
    <g style="animation:rotate-rev 28s linear infinite;transform-origin:0 0">
      <circle cx="-45" cy="10" r="2" fill="#FF69B4" opacity="0.7"/>
      <circle cx="35" cy="-25" r="1.5" fill="#D4A5FF" opacity="0.6"/>
    </g>
  </g>

  <!-- Floating particles -->
  <g filter="url(#glow)">
    <circle cx="290" cy="50" r="2" fill="#FF69B4" style="animation:pulse 3s ease-in-out infinite"/>
    <circle cx="450" cy="35" r="2.5" fill="#D4A5FF" style="animation:pulse 4s ease-in-out 0.5s infinite"/>
    <circle cx="610" cy="55" r="2" fill="#00D4FF" style="animation:pulse 3.5s ease-in-out 1s infinite"/>
    <circle cx="370" cy="80" r="1.5" fill="#FF69B4" style="animation:pulse 5s ease-in-out 0.3s infinite"/>
    <circle cx="530" cy="70" r="2" fill="#D4A5FF" style="animation:pulse 4.5s ease-in-out 0.8s infinite"/>
    <circle cx="200" cy="65" r="1.5" fill="#00D4FF" style="animation:pulse 3.8s ease-in-out 1.5s infinite"/>
    <circle cx="700" cy="50" r="2" fill="#FF69B4" style="animation:pulse 4.2s ease-in-out 0.6s infinite"/>
  </g>

  <!-- Sparkle dots -->
  <g>
    <circle cx="180" cy="30" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="25" r="1.2" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="20" r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="30" r="1.1" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="25" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Scanning line -->
  <rect x="0" y="128" width="900" height="1" fill="url(#aurora1)" opacity="0.15">
    <animate attributeName="y" values="80;200;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated dashed arcs -->
  <g fill="none" stroke-width="0.8" opacity="0.2" filter="url(#glow)">
    <path d="M 350,130 A 80,80 0 0,1 430,50" stroke="#FF69B4" stroke-dasharray="4 8" style="animation:dash 15s linear infinite"/>
    <path d="M 470,50 A 80,80 0 0,1 550,130" stroke="#D4A5FF" stroke-dasharray="4 8" style="animation:dash 15s linear infinite"/>
    <path d="M 380,130 A 60,60 0 0,1 440,70" stroke="#00D4FF" stroke-dasharray="3 6" style="animation:dash 20s linear infinite"/>
    <path d="M 460,70 A 60,60 0 0,1 520,130" stroke="#FF69B4" stroke-dasharray="3 6" style="animation:dash 20s linear infinite"/>
  </g>

  <!-- QIUHU text with gradient and glow -->
  <text x="450" y="138" text-anchor="middle" font-family="'Courier New', monospace" font-size="72" font-weight="bold" fill="url(#text-grad)" filter="url(#glow-strong)" letter-spacing="12">
    QIUHU
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#FF69B4" opacity="0.6" letter-spacing="8">
    DEVELOPER | BUILDER | CREATOR
    <animate attributeName="opacity" values="0.6;0.85;0.6" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Underline shimmer -->
  <line x1="280" y1="180" x2="620" y2="180" stroke="url(#text-grad)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Bottom accent dots -->
  <g filter="url(#glow)">
    <circle cx="300" cy="200" r="2" fill="#FF69B4" style="animation:pulse 4s ease-in-out infinite"/>
    <circle cx="450" cy="210" r="2.5" fill="#D4A5FF" style="animation:pulse 3.5s ease-in-out 0.5s infinite"/>
    <circle cx="600" cy="200" r="2" fill="#00D4FF" style="animation:pulse 4.5s ease-in-out 1s infinite"/>
  </g>
</svg>
